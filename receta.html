        .receta-header {
            background: white;

            border-radius: 20px;

            display: flex;
            gap: 30px;

        }
        .receta-header img {
            width: 250px;
            height: 250px;
            border-radius: 15px;
            object-fit: cover;
        }
        .receta-header-info h1 {
            color: #2d3436;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
        }
        .receta-stats {
            color: #27ae60;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .receta-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .receta-section h2 {
            color: #2d3436;
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 15px;
        }
        .receta-section h2 i {
            color: #27ae60;
        }
        .ingredientes-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .ingredientes-list li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            color: #636e72;
            font-size: 1rem;
        }
        .ingredientes-list li:last-child {
            border-bottom: none;
        }
        .ingredientes-list li:before {
            content: "✓";
            color: #27ae60;
            font-weight: bold;
            margin-right: 10px;
            font-size: 1.1rem;
        }
        .pasos-list {
            padding-left: 20px;
            margin: 0;
        }
        .pasos-list li {
            margin-bottom: 15px;
            color: #636e72;
            font-size: 1rem;
            line-height: 1.6;
        }
        .pasos-list li:last-child {
            margin-bottom: 0;
        }
        .nutricion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .nutricion-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #27ae60;
        }
        .nutricion-item-label {
            color: #636e72;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .nutricion-item-valor {
            color: #27ae60;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 30px;
        }
        .btn-volver:hover {
            background: #229954;
            transform: translateX(-5px);
        }
        @media (max-width: 768px) {
            .receta-header {
                flex-direction: column;
            }
            .receta-header img {
                width: 100%;
                height: auto;
            }
            .receta-page {
                padding-top: 80px;
            }
            .receta-header-info h1 {
