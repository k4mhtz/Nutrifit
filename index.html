<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrifit - Bienvenid@</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Urbanist', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #000000;
            overflow-x: hidden;
        }

        /* Fondo de frutas y verduras con leve difuminado general */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Reemplaza esta URL por la ruta local de tu imagen de frutas si lo prefieres */
            background: url('https://images.unsplash.com/photo-1610348725531-843dff563e2c?q=80&w=1920') no-repeat center center;
            background-size: cover;
            filter: blur(4px) brightness(0.6);
            z-index: 1;
        }

        /* Contenedor Principal (Estilo Glassmorphism / Fitia) */
        .auth-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .brand-logo span {
            color: #27ae60; /* Verde Nutrifit */
        }

        .subtitle {
            font-size: 15px;
            color: #555555;
            margin-bottom: 30px;
        }

        /* Selector de pestañas (Login / Registro) */
        .tab-container {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #666666;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        /* Formularios */
        .auth-form {
            display: none;
            flex-direction: column;
            text-align: left;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            font-size: 15px;
            color: #000000;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: #27ae60;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        /* Ajuste del reCAPTCHA para que no rompa el diseño */
        .captcha-wrapper {
            margin: 15px 0;
            display: flex;
            justify-content: center;
        }

        /* Botón de Acción Principal */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #219653;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Enlaces secundarios */
        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #555555;
        }

        .form-footer a {
            color: #27ae60;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="auth-container">
        <div class="brand-logo">
            🍏 Nutri<span>fit</span>
        </div>
        <p class="subtitle">Tu salud bajo control inteligente</p>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
        </div>

        <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="input-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>

            <div class="captcha-wrapper">
                <div class="g-recaptcha" data-sitekey="TU_DATA_SITEKEY_AQUÍ"></div>
            </div>

            <button type="submit" class="submit-btn">Ingresar de forma segura</button>
            
            <div class="form-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </form>

        <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
            <div class="input-group">
                <label for="reg-name">Nombre Completo</label>
                <input type="text" id="reg-name" placeholder="Tu nombre" required>
            </div>
            <div class="input-group">
                <label for="reg-email">Correo Electrónico</label>
                <input type="email" id="reg-email" placeholder="tu@correo.com" required>
            </div>
            <div class="input-group">
                <label for="reg-password">Contraseña</label>
                <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="submit-btn">Crear mi cuenta</button>
        </form>
    </div>

    <script>
        // Cambiar entre pestañas de Login y Registro de forma fluida
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(tab => tab.classList.remove('active'));
            forms.forEach(form => form.classList.remove('active'));

            if (type === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            
            // Forzar a reCAPTCHA a renderizarse correctamente si es necesario
            if(typeof grecaptcha !== 'undefined') {
                grecaptcha.reset();
            }
        }

        // Lógica de Inicio de Sesión conectada a tu formulario
        function handleLogin(e) {
            e.preventDefault();
            
            // Validar reCAPTCHA
            if (typeof grecaptcha !== 'undefined') {
                const response = grecaptcha.getResponse();
                if (response.length === 0) {
                    alert("Por favor, marca la casilla del reCAPTCHA para verificar que no eres un robot.");
                    return;
                }
            }

            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            console.log("Iniciando sesión con:", email);
            
            /* AQUÍ INTEGRAS TU CONEXIÓN CON FIREBASE AUTH:
               
               auth.signInWithEmailAndPassword(email, pass)
                   .then((userCredential) => {
                       // Login exitoso, redirección al panel
                       window.location.href = "panel.html";
                   })
                   .catch((error) => {
                       alert("Error de autenticación: " + error.message);
                   });
            */
        }

        // Lógica de Registro conectada a tu formulario
        function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;

            if (pass.length < 8) {
                alert("La contraseña debe tener al menos 8 caracteres.");
                return;
            }

            console.log("Registrando a:", email);

            /* AQUÍ INTEGRAS TU CREACIÓN DE USUARIO EN FIREBASE:
               
               auth.createUserWithEmailAndPassword(email, pass)
                   .then((userCredential) => {
                       // Cuenta creada, procedes a guardar los datos en Firestore si lo deseas
                       alert("¡Cuenta creada con éxito!");
                       switchTab('login');
                   })
                   .catch((error) => {
                       alert("Error en el registro: " + error.message);
                   });
            */
        }
    </script>
</body>
</html>
