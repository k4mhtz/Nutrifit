    <style>
        .recetas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 20px;
        }
        .receta-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .receta-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .receta-imagen {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
        }
        .receta-contenido {
            padding: 20px;
        }
        .receta-contenido h3 {
            margin: 0 0 10px 0;
            color: #2d3436;
            font-size: 1.1rem;
        }
        .receta-calorias {
            color: #27ae60;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 0 0 10px 0;
        }
        .receta-desc {
            color: #636e72;
            font-size: 0.85rem;
            margin: 0 0 15px 0;
            line-height: 1.5;
        }
        .receta-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tag {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .recetas-header {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .recetas-header h1 {
            font-size: 2.5rem;
            margin: 0 0 15px 0;
        }
        .recetas-header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>

            const card = document.createElement('div');
            card.className = 'receta-card';
            card.style.cursor = 'pointer';
            card.onclick = () => {

            };
            
            const tagsHtml = receta.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            
            card.innerHTML = `
                <div class="receta-imagen" style="background-image: url('${receta.imagen}');"></div>
                <div class="receta-contenido">
                    <h3>${receta.titulo}</h3>

                    </div>
